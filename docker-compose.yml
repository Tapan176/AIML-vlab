version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiml_backend
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiml_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
